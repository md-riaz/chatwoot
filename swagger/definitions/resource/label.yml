type: object
properties:
  id:
    type: integer
    description: Label ID
  title:
    type: string
    description: Label title
  description:
    type: string
    description: Label description
  color:
    type: string
    description: Label color in hex format
    example: '#1F93FF'
  show_on_sidebar:
    type: boolean
    description: Whether to show label on sidebar
