type: object
required:
  - name
  - actions
properties:
  name:
    type: string
    description: Macro name
  visibility:
    type: string
    description: Visibility of the macro
    enum:
      - global
      - personal
  actions:
    type: array
    description: List of actions to execute
    items:
      type: object
      properties:
        action_name:
          type: string
          description: Name of the action
        action_params:
          type: array
          description: Parameters for the action
          items:
            type: string
