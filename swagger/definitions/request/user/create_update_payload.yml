type: object
properties:
  name:
    type: string
    description: Name of the user
    example: 'Daniel'
  display_name:
    type: string
    description: Display name of the user
    example: 'Dan'
  email:
    type: string
    description: Email of the user
    example: 'daniel@acme.inc'
  password:
    type: string
    description: Password must contain uppercase, lowercase letters, number and a special character
    example: 'Password2!'
  phone_number:
    type: string
    description: Phone number of the user
    example: '+1234567890'
  type:
    type: string
    enum: ['User', 'SuperAdmin']
    description: Platform-level user type (Rails STI compatibility)
    example: 'User'
  role:
    type: string
    enum: ['agent', 'administrator']
    description: Account-level role for the user
    example: 'agent'
  custom_attributes:
    type: object
    description: Custom attributes you want to associate with the user
    example: {}
