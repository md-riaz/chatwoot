tags:
  - Notifications
operationId: list-all-notifications
summary: List all notifications
security:
  - userApiKey: []
description: List all notifications for the current user in the account
parameters:
  - in: query
    name: page
    schema:
      type: integer
    description: Page number for pagination
  - in: query
    name: includes
    schema:
      type: array
      items:
        type: string
    description: Include additional data
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              type: object
              properties:
                payload:
                  type: array
                  items:
                    $ref: '#/components/schemas/notification'
            meta:
              type: object
              properties:
                unread_count:
                  type: integer
                count:
                  type: integer
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
