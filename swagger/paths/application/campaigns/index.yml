tags:
  - Campaigns
operationId: list-all-campaigns
summary: List all campaigns
security:
  - userApiKey: []
description: List all campaigns in the account
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          type: array
          description: 'Array of campaign objects'
          items:
            $ref: '#/components/schemas/campaign'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
