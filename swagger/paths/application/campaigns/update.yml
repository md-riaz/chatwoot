tags:
  - Campaigns
operationId: update-a-campaign
summary: Update a campaign
security:
  - userApiKey: []
description: Update a campaign in the account
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/campaign_create_update_payload'
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/campaign'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Campaign not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
