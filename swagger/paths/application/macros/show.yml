tags:
  - Macros
operationId: get-a-macro
summary: Get a macro
security:
  - userApiKey: []
description: Get a macro from the account
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/macro'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Macro not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
