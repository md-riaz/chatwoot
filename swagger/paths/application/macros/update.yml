tags:
  - Macros
operationId: update-a-macro
summary: Update a macro
security:
  - userApiKey: []
description: Update a macro in the account
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/macro_create_update_payload'
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/macro'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Macro not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
