# ClearLine Nginx Configuration with SSL (Certbot/Cloudflare compatible)
# Laravel API + Reverb WebSocket + Static Frontend

# Upstream for Laravel PHP-FPM
upstream php-fpm {
    server unix:/var/run/php/php8.2-fpm.sock;
    # Alternative: server 127.0.0.1:9000;
}

# Upstream for Laravel Reverb WebSocket
upstream reverb {
    server 127.0.0.1:8080;
}

# Main server block - HTTP (will be managed by Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name clearline.example.com;
    
    # Allow Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server block (SSL managed by Certbot or Cloudflare)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clearline.example.com;
    
    # SSL Configuration (will be managed by Certbot)
    # ssl_certificate and ssl_certificate_key will be added by Certbot
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;
    
    # Document root for Laravel
    root /var/www/clearline/public;
    index index.php index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Client max body size for file uploads
    client_max_body_size 100M;
    
    # Frontend SPA routes (Svelte UI)
    location /app {
        try_files $uri $uri/ /app/index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API routes
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Broadcasting auth routes
    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # WebSocket proxy for Laravel Reverb
    # Proxies /ws to Reverb's /app/{key} endpoint
    location /ws {
        # Read the app key from a file (set during deployment)
        set $reverb_app_key "";
        access_by_lua_block {
            local file = io.open("/var/www/clearline/.reverb_app_key", "r")
            if file then
                ngx.var.reverb_app_key = file:read("*line")
                file:close()
            else
                ngx.var.reverb_app_key = "default-key"
            end
        }
        
        # Rewrite /ws to /app/{key} for Reverb compatibility
        rewrite ^/ws(.*)$ /app/$reverb_app_key$1 break;
        
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # WebSocket timeout settings
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # Laravel PHP processing
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        
        # Security
        fastcgi_param HTTP_PROXY "";
        
        # Increase timeouts for long-running requests
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /(storage|bootstrap|config|database|resources|routes|tests|vendor)/ {
        deny all;
    }
    
    # Laravel storage symlink
    location /storage {
        alias /var/www/clearline/storage/app/public;
    }
    
    # Favicon and robots
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    # Error pages
    error_page 404 /app/index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}