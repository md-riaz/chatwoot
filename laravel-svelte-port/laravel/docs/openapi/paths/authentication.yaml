# Authentication API Paths

/auth/login:
  post:
    tags:
      - Authentication
    summary: User login
    description: Authenticate a user and receive an access token
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: "user@example.com"
              password:
                type: string
                format: password
                example: "password123"
          example:
            email: "user@example.com"
            password: "password123"
    responses:
      '200':
        description: Successfully authenticated
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: "1|abcdef123456..."
                user:
                  $ref: '../openapi.yaml#/components/schemas/User'
            example:
              token: "1|abcdef123456789"
              user:
                id: 1
                name: "John Doe"
                email: "user@example.com"
                availability_status: "online"
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Error'
            example:
              error: "Invalid credentials"

/auth/register:
  post:
    tags:
      - Authentication
    summary: User registration
    description: Register a new user account
    operationId: register
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - email
              - password
              - password_confirmation
            properties:
              name:
                type: string
                example: "John Doe"
              email:
                type: string
                format: email
                example: "newuser@example.com"
              password:
                type: string
                format: password
                minLength: 8
                example: "password123"
              password_confirmation:
                type: string
                format: password
                example: "password123"
          example:
            name: "John Doe"
            email: "newuser@example.com"
            password: "password123"
            password_confirmation: "password123"
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                user:
                  $ref: '../openapi.yaml#/components/schemas/User'
      '422':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Error'

/auth/logout:
  post:
    tags:
      - Authentication
    summary: User logout
    description: Revoke the current access token
    operationId: logout
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Successfully logged out
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Successfully logged out"
      '401':
        description: Unauthenticated

/auth/me:
  get:
    tags:
      - Authentication
    summary: Get current user
    description: Get the currently authenticated user's information
    operationId: getCurrentUser
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Current user information
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/User'
      '401':
        description: Unauthenticated
