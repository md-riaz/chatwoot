# Contacts API Paths

/accounts/{account_id}/contacts:
  get:
    tags:
      - Contacts
    summary: List contacts
    description: Get all contacts for an account
    operationId: listContacts
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
        example: 1
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: per_page
        in: query
        schema:
          type: integer
          default: 25
      - name: sort
        in: query
        schema:
          type: string
          enum: [name, email, phone_number, last_activity_at, created_at]
      - name: order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    responses:
      '200':
        description: List of contacts
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Contact'
                meta:
                  $ref: '../openapi.yaml#/components/schemas/Pagination'
            example:
              data:
                - id: 1
                  name: "Jane Customer"
                  email: "jane@customer.com"
                  phone_number: "+1234567890"
                - id: 2
                  name: "John Client"
                  email: "john@client.com"
              meta:
                current_page: 1
                per_page: 25
                total: 150

  post:
    tags:
      - Contacts
    summary: Create contact
    description: Create a new contact
    operationId: createContact
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              inbox_id:
                type: integer
                example: 1
              name:
                type: string
                example: "Jane Doe"
              email:
                type: string
                format: email
                example: "jane@example.com"
              phone_number:
                type: string
                example: "+1234567890"
              identifier:
                type: string
                example: "customer_123"
              custom_attributes:
                type: object
                additionalProperties: true
                example:
                  company: "Acme Corp"
                  plan: "premium"
          example:
            inbox_id: 1
            name: "Jane Doe"
            email: "jane@example.com"
            phone_number: "+1234567890"
            custom_attributes:
              company: "Acme Corp"
    responses:
      '201':
        description: Contact created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'
      '422':
        description: Validation error

/accounts/{account_id}/contacts/{contact_id}:
  get:
    tags:
      - Contacts
    summary: Get contact
    description: Get a specific contact by ID
    operationId: getContact
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Contact details
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'
      '404':
        description: Contact not found

  patch:
    tags:
      - Contacts
    summary: Update contact
    description: Update contact details
    operationId: updateContact
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              email:
                type: string
                format: email
              phone_number:
                type: string
              identifier:
                type: string
              custom_attributes:
                type: object
                additionalProperties: true
          example:
            name: "Jane Smith"
            custom_attributes:
              company: "New Company Inc"
    responses:
      '200':
        description: Contact updated
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'

  delete:
    tags:
      - Contacts
    summary: Delete contact
    description: Delete a contact
    operationId: deleteContact
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Contact deleted

/accounts/{account_id}/contacts/search:
  get:
    tags:
      - Contacts
    summary: Search contacts
    description: Search contacts by query
    operationId: searchContacts
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: q
        in: query
        required: true
        schema:
          type: string
        example: "jane"
        description: Search query (name, email, phone)
      - name: page
        in: query
        schema:
          type: integer
          default: 1
    responses:
      '200':
        description: Search results
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Contact'

/accounts/{account_id}/contacts/filter:
  post:
    tags:
      - Contacts
    summary: Filter contacts
    description: Filter contacts with advanced criteria
    operationId: filterContacts
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              payload:
                type: array
                items:
                  type: object
                  properties:
                    attribute_key:
                      type: string
                    filter_operator:
                      type: string
                    values:
                      type: array
                      items:
                        type: string
          example:
            payload:
              - attribute_key: "email"
                filter_operator: "contains"
                values: ["@acme.com"]
    responses:
      '200':
        description: Filtered contacts
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Contact'

/accounts/{account_id}/contacts/import:
  post:
    tags:
      - Contacts
    summary: Import contacts
    description: Bulk import contacts from CSV
    operationId: importContacts
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
                description: CSV file with contact data
    responses:
      '200':
        description: Import started
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Import started, you will be notified when complete"

/accounts/{account_id}/contacts/export:
  post:
    tags:
      - Contacts
    summary: Export contacts
    description: Export contacts to CSV
    operationId: exportContacts
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              label:
                type: string
                description: Filter by label
    responses:
      '200':
        description: Export started
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Export started, you will receive an email when ready"

/accounts/{account_id}/contacts/{contact_id}/merge:
  post:
    tags:
      - Contacts
    summary: Merge contacts
    description: Merge two contacts into one
    operationId: mergeContacts
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
        description: Primary contact ID (will be kept)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - merge_contact_id
            properties:
              merge_contact_id:
                type: integer
                example: 2
                description: Contact ID to merge (will be deleted)
          example:
            merge_contact_id: 2
    responses:
      '200':
        description: Contacts merged
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'

/accounts/{account_id}/contacts/{contact_id}/notes:
  get:
    tags:
      - Contacts
    summary: List contact notes
    description: Get all notes for a contact
    operationId: listContactNotes
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of notes
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/ContactNote'
            example:
              data:
                - id: 1
                  content: "VIP customer, handle with care"
                  user_id: 1
                  created_at: "2025-01-01T10:00:00Z"

  post:
    tags:
      - Contacts
    summary: Create contact note
    description: Add a note to a contact
    operationId: createContactNote
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - content
            properties:
              content:
                type: string
                example: "Customer prefers email communication"
          example:
            content: "Customer prefers email communication"
    responses:
      '201':
        description: Note created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ContactNote'

/accounts/{account_id}/contacts/{contact_id}/notes/{note_id}:
  delete:
    tags:
      - Contacts
    summary: Delete contact note
    description: Delete a note from a contact
    operationId: deleteContactNote
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
      - name: note_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Note deleted
