# Widget API Paths (Public)

/widget/config:
  post:
    tags:
      - Widget
    summary: Get widget configuration
    description: Get widget configuration by website token
    operationId: getWidgetConfig
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - website_token
            properties:
              website_token:
                type: string
                example: "abc123def456"
          example:
            website_token: "abc123def456"
    responses:
      '200':
        description: Widget configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                widget_color:
                  type: string
                  example: "#1f93ff"
                website_name:
                  type: string
                  example: "Acme Corp"
                welcome_title:
                  type: string
                  example: "Hi there!"
                welcome_tagline:
                  type: string
                  example: "We make it simple to connect with us."
                working_hours_enabled:
                  type: boolean
                  example: false
                csat_survey_enabled:
                  type: boolean
                  example: true
                pre_chat_form_enabled:
                  type: boolean
                  example: false
                pre_chat_form_options:
                  type: object
                online:
                  type: boolean
                  example: true
            example:
              widget_color: "#1f93ff"
              website_name: "Acme Corp Support"
              welcome_title: "Hi there!"
              welcome_tagline: "We're here to help"
              online: true
              csat_survey_enabled: true
      '404':
        description: Invalid website token

/widget/campaigns:
  get:
    tags:
      - Widget
    summary: Get active campaigns
    description: Get active campaigns for the widget
    operationId: getWidgetCampaigns
    parameters:
      - name: website_token
        in: query
        required: true
        schema:
          type: string
        example: "abc123def456"
    responses:
      '200':
        description: List of campaigns
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  message:
                    type: string
                  trigger_rules:
                    type: object
            example:
              - id: 1
                title: "Welcome Campaign"
                message: "Hi! Need any help?"
                trigger_rules:
                  url: "pricing"
                  time_on_page: 10

/widget/contact:
  get:
    tags:
      - Widget
    summary: Get current contact
    description: Get the current visitor's contact information
    operationId: getWidgetContact
    security:
      - widgetAuth: []
    responses:
      '200':
        description: Contact information
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'

  patch:
    tags:
      - Widget
    summary: Update contact
    description: Update the visitor's contact information
    operationId: updateWidgetContact
    security:
      - widgetAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: "Jane Visitor"
              email:
                type: string
                format: email
                example: "jane@visitor.com"
              phone_number:
                type: string
                example: "+1234567890"
              custom_attributes:
                type: object
                additionalProperties: true
          example:
            name: "Jane Visitor"
            email: "jane@visitor.com"
    responses:
      '200':
        description: Contact updated
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'

/widget/contact/set_user:
  patch:
    tags:
      - Widget
    summary: Set user identifier
    description: Set the user identifier for the contact (for logged-in users)
    operationId: setWidgetUser
    security:
      - widgetAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              identifier:
                type: string
                example: "user_123"
              identifier_hash:
                type: string
                description: HMAC hash for identity verification
                example: "abc123..."
              name:
                type: string
              email:
                type: string
                format: email
          example:
            identifier: "user_123"
            name: "John User"
            email: "john@user.com"
    responses:
      '200':
        description: User set
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Contact'

/widget/conversations:
  get:
    tags:
      - Widget
    summary: List widget conversations
    description: Get all conversations for the current contact
    operationId: listWidgetConversations
    security:
      - widgetAuth: []
    responses:
      '200':
        description: List of conversations
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../openapi.yaml#/components/schemas/Conversation'

  post:
    tags:
      - Widget
    summary: Create widget conversation
    description: Start a new conversation from the widget
    operationId: createWidgetConversation
    security:
      - widgetAuth: []
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              contact:
                type: object
                properties:
                  name:
                    type: string
                  email:
                    type: string
                  phone_number:
                    type: string
              message:
                type: object
                properties:
                  content:
                    type: string
          example:
            contact:
              name: "Visitor"
              email: "visitor@example.com"
            message:
              content: "Hello, I need help!"
    responses:
      '201':
        description: Conversation created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Conversation'

/widget/conversations/toggle_status:
  get:
    tags:
      - Widget
    summary: Toggle conversation status
    description: Toggle the conversation status (resolve/reopen)
    operationId: toggleWidgetConversationStatus
    security:
      - widgetAuth: []
    responses:
      '200':
        description: Status toggled
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Conversation'

/widget/messages:
  get:
    tags:
      - Widget
    summary: List widget messages
    description: Get messages for the current conversation
    operationId: listWidgetMessages
    security:
      - widgetAuth: []
    parameters:
      - name: before
        in: query
        schema:
          type: integer
        description: Get messages before this message ID
    responses:
      '200':
        description: List of messages
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../openapi.yaml#/components/schemas/Message'

  post:
    tags:
      - Widget
    summary: Send widget message
    description: Send a message from the widget
    operationId: createWidgetMessage
    security:
      - widgetAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - content
            properties:
              content:
                type: string
                example: "Hello, I need help with my order"
              echo_id:
                type: string
                description: Client-generated ID for deduplication
          example:
            content: "Hello, I need help with my order"
        multipart/form-data:
          schema:
            type: object
            properties:
              content:
                type: string
              attachments[]:
                type: array
                items:
                  type: string
                  format: binary
    responses:
      '201':
        description: Message sent
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Message'

/widget/inbox_members:
  get:
    tags:
      - Widget
    summary: List available agents
    description: Get available agents for the inbox
    operationId: listWidgetInboxMembers
    security:
      - widgetAuth: []
    responses:
      '200':
        description: List of available agents
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  avatar_url:
                    type: string
                    nullable: true
                  availability_status:
                    type: string

/widget/labels:
  post:
    tags:
      - Widget
    summary: Add label to conversation
    description: Add a label to the current conversation
    operationId: addWidgetLabel
    security:
      - widgetAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - label
            properties:
              label:
                type: string
                example: "sales-inquiry"
          example:
            label: "sales-inquiry"
    responses:
      '200':
        description: Label added
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Label added"

/widget/labels/{label}:
  delete:
    tags:
      - Widget
    summary: Remove label from conversation
    description: Remove a label from the current conversation
    operationId: removeWidgetLabel
    security:
      - widgetAuth: []
    parameters:
      - name: label
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Label removed

/widget/events:
  post:
    tags:
      - Widget
    summary: Track event
    description: Track a custom event from the widget
    operationId: trackWidgetEvent
    security:
      - widgetAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                example: "page_viewed"
              data:
                type: object
                additionalProperties: true
                example:
                  page: "/pricing"
                  referrer: "google"
          example:
            name: "page_viewed"
            data:
              page: "/pricing"
              referrer: "google"
    responses:
      '200':
        description: Event tracked
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Event tracked"

/widget/direct_uploads:
  post:
    tags:
      - Widget
    summary: Upload file
    description: Upload a file attachment
    operationId: widgetDirectUpload
    security:
      - widgetAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - attachment
            properties:
              attachment:
                type: string
                format: binary
    responses:
      '200':
        description: File uploaded
        content:
          application/json:
            schema:
              type: object
              properties:
                file_url:
                  type: string
                  example: "https://storage.example.com/file.jpg"
                blob_key:
                  type: string
                  example: "abc123"
