# SLA Policies
/accounts/{account_id}/sla_policies:
  get:
    tags:
      - SLA Policies
    summary: List SLA policies
    description: Get all SLA policies for an account (Admin only)
    operationId: listSlaPolicies
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of SLA policies
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/SlaPolicy'
            example:
              data:
                - id: 1
                  name: "Premium Support"
                  first_response_time_threshold: 3600
                  resolution_time_threshold: 86400
                  active: true
                - id: 2
                  name: "Standard Support"
                  first_response_time_threshold: 14400
                  resolution_time_threshold: 259200
                  active: true

  post:
    tags:
      - SLA Policies
    summary: Create SLA policy
    description: Create a new SLA policy (Admin only)
    operationId: createSlaPolicy
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                example: "Premium Support"
              description:
                type: string
                example: "SLA for premium customers"
              first_response_time_threshold:
                type: integer
                description: "Time in seconds"
                example: 3600
              next_response_time_threshold:
                type: integer
                example: 7200
              resolution_time_threshold:
                type: integer
                example: 86400
              only_during_business_hours:
                type: boolean
                default: false
              active:
                type: boolean
                default: true
          example:
            name: "Premium Support"
            description: "SLA for premium customers"
            first_response_time_threshold: 3600
            resolution_time_threshold: 86400
            active: true
    responses:
      '201':
        description: SLA policy created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SlaPolicy'

/accounts/{account_id}/sla_policies/{policy_id}:
  get:
    tags:
      - SLA Policies
    summary: Get SLA policy
    description: Get SLA policy details (Admin only)
    operationId: getSlaPolicy
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: policy_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: SLA policy details
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SlaPolicy'

  patch:
    tags:
      - SLA Policies
    summary: Update SLA policy
    description: Update SLA policy configuration (Admin only)
    operationId: updateSlaPolicy
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: policy_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              first_response_time_threshold:
                type: integer
              next_response_time_threshold:
                type: integer
              resolution_time_threshold:
                type: integer
              only_during_business_hours:
                type: boolean
              active:
                type: boolean
          example:
            first_response_time_threshold: 1800
            active: true
    responses:
      '200':
        description: SLA policy updated
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SlaPolicy'

  delete:
    tags:
      - SLA Policies
    summary: Delete SLA policy
    description: Delete an SLA policy (Admin only)
    operationId: deleteSlaPolicy
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: policy_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: SLA policy deleted

/accounts/{account_id}/sla_policies/breaches:
  get:
    tags:
      - SLA Policies
    summary: Get SLA breaches
    description: Get conversations that breached SLA (Admin only)
    operationId: getSlaBreaches
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: since
        in: query
        schema:
          type: string
          format: date
      - name: until
        in: query
        schema:
          type: string
          format: date
      - name: page
        in: query
        schema:
          type: integer
          default: 1
    responses:
      '200':
        description: SLA breaches
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Conversation'

/accounts/{account_id}/sla_policies/metrics:
  get:
    tags:
      - SLA Policies
    summary: Get SLA metrics
    description: Get SLA performance metrics (Admin only)
    operationId: getSlaMetrics
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: since
        in: query
        schema:
          type: string
          format: date
      - name: until
        in: query
        schema:
          type: string
          format: date
    responses:
      '200':
        description: SLA metrics
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    total_conversations:
                      type: integer
                      example: 500
                    sla_hit:
                      type: integer
                      example: 480
                    sla_breached:
                      type: integer
                      example: 20
                    sla_hit_percentage:
                      type: number
                      format: float
                      example: 96.0
                    avg_first_response_time:
                      type: integer
                      example: 1800
                    avg_resolution_time:
                      type: integer
                      example: 43200
            example:
              data:
                total_conversations: 500
                sla_hit: 480
                sla_breached: 20
                sla_hit_percentage: 96.0
                avg_first_response_time: 1800
                avg_resolution_time: 43200
