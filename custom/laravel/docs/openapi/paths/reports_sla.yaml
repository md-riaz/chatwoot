# Reports & SLA Policies API Paths

# Reports
/accounts/{account_id}/reports:
  get:
    tags:
      - Reports
    summary: Get reports summary
    description: Get account-level reports summary (Admin only)
    operationId: getReportsSummary
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: since
        in: query
        schema:
          type: string
          format: date
        example: "2025-01-01"
        description: Start date for report period
      - name: until
        in: query
        schema:
          type: string
          format: date
        example: "2025-01-31"
        description: End date for report period
      - name: type
        in: query
        schema:
          type: string
          enum: [account, agent, inbox, team, label]
          default: account
    responses:
      '200':
        description: Reports summary
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    conversations_count:
                      type: integer
                      example: 150
                    incoming_count:
                      type: integer
                      example: 100
                    outgoing_count:
                      type: integer
                      example: 200
                    resolutions_count:
                      type: integer
                      example: 120
            example:
              data:
                conversations_count: 150
                incoming_count: 100
                outgoing_count: 200
                resolutions_count: 120
      '403':
        description: Admin access required

