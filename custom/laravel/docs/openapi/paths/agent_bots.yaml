/accounts/{account_id}/agent_bots/{agent_bot_id}/reset_access_token:
  post:
    tags:
      - Agent Bots
    summary: Reset agent bot access token
    description: Resets the access token for the specified agent bot
    operationId: resetAgentBotAccessToken
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: agent_bot_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Access token reset
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Access token reset"
                access_token:
                  type: string
                  example: "newtoken123"