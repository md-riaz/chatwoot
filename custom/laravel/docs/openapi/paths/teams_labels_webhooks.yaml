    description: Update webhook configuration (Admin only)
    operationId: updateWebhook
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: webhook_id
        in: path
        required: true
