# Teams, Labels, Webhooks API Paths

# Teams
/accounts/{account_id}/teams:
  get:
    tags:
      - Teams
    summary: List teams
    description: Get all teams for an account
    operationId: listTeams
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of teams
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Team'
            example:
              data:
                - id: 1
                  name: "Support Team"
                  description: "General support"
                  allow_auto_assign: true
                - id: 2
                  name: "Sales Team"
                  description: "Sales inquiries"

  post:
    tags:
      - Teams
    summary: Create team
    description: Create a new team (Admin only)
    operationId: createTeam
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                example: "Support Team"
              description:
                type: string
                example: "General support team"
              allow_auto_assign:
                type: boolean
                default: true
          example:
            name: "Support Team"
            description: "General support team"
            allow_auto_assign: true
    responses:
      '201':
        description: Team created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Team'

/accounts/{account_id}/teams/{team_id}:
  get:
    tags:
      - Teams
    summary: Get team
    description: Get team details
    operationId: getTeam
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: team_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Team details
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Team'

  patch:
    tags:
      - Teams
    summary: Update team
    description: Update team details (Admin only)
    operationId: updateTeam
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: team_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              allow_auto_assign:
                type: boolean
          example:
            name: "Updated Team Name"
    responses:
      '200':
        description: Team updated
        content:
          application/json:
            schema:
