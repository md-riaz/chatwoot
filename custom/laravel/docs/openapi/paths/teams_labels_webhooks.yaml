/accounts/{account_id}/teams/{team_id}/members:
  get:
    tags:
      - Teams
    summary: List team members
    description: Get all members of a team
    operationId: listTeamMembers
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: team_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of team members
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/User'

  post:
    tags:
      - Teams
    summary: Add team members
    description: Add members to a team (Admin only)
    operationId: addTeamMembers
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: team_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - user_ids
            properties:
              user_ids:
                type: array
                items:
                  type: integer
                example: [1, 2, 3]
          example:
            user_ids: [1, 2, 3]
    responses:
      '200':
        description: Members added
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Members added successfully"

  delete:
    tags:
      - Teams
    summary: Remove team members
    description: Remove members from a team (Admin only)
    operationId: removeTeamMembers
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: team_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - user_ids
            properties:
              user_ids:
                type: array
                items:
                  type: integer
          example:
            user_ids: [2]
    responses:
      '200':
        description: Members removed

# Labels
/accounts/{account_id}/labels:
  get:
    tags:
      - Labels
    summary: List labels
    description: Get all labels for an account
    operationId: listLabels
    security:
      - bearerAuth: []
    parameters:
