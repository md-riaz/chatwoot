# Webhooks
/accounts/{account_id}/webhooks:
  get:
    tags:
      - Webhooks
    summary: List webhooks
    description: Get all webhooks for an account (Admin only)
    operationId: listWebhooks
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of webhooks
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Webhook'
            example:
              data:
                - id: 1
                  url: "https://example.com/webhook"
                  subscriptions: ["conversation_created", "message_created"]
      '403':
        description: Admin access required

  post:
    tags:
      - Webhooks
    summary: Create webhook
    description: Create a new webhook (Admin only)
    operationId: createWebhook
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - url
              - subscriptions
            properties:
              url:
                type: string
                format: uri
                example: "https://example.com/webhook"
              subscriptions:
                type: array
                items:
                  type: string
                  enum:
                    - conversation_created
                    - conversation_status_changed
                    - conversation_updated
                    - message_created
                    - message_updated
                    - webwidget_triggered
                example: ["conversation_created", "message_created"]
          example:
            url: "https://example.com/webhook"
            subscriptions: ["conversation_created", "message_created"]
    responses:
      '201':
        description: Webhook created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Webhook'

/accounts/{account_id}/webhooks/{webhook_id}:
  get:
    tags:
      - Webhooks
    summary: Get webhook
    description: Get webhook details (Admin only)
