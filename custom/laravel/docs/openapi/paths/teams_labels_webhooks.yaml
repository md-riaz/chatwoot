                  items:
                    $ref: '../openapi.yaml#/components/schemas/Label'
            example:
              data:
                - id: 1
                  title: "bug"
                  color: "#FF0000"
                  show_on_sidebar: true
                - id: 2
                  title: "feature-request"
                  color: "#00FF00"

  post:
    tags:
      - Labels
    summary: Create label
    description: Create a new label (Admin only)
    operationId: createLabel
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - title
            properties:
              title:
                type: string
                example: "urgent"
              description:
                type: string
                example: "Urgent issues requiring immediate attention"
              color:
                type: string
                example: "#FF0000"
              show_on_sidebar:
                type: boolean
                default: true
          example:
            title: "urgent"
            description: "Urgent issues"
            color: "#FF0000"
            show_on_sidebar: true
    responses:
      '201':
        description: Label created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Label'

