# Messages API Paths

/accounts/{account_id}/conversations/{conversation_id}/messages:
  get:
    tags:
      - Messages
    summary: List messages
    description: Get all messages in a conversation
    operationId: listMessages
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
        example: 1
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
        example: 1
      - name: before
        in: query
        schema:
          type: integer
        description: Message ID to get messages before
      - name: after
        in: query
        schema:
          type: integer
        description: Message ID to get messages after
    responses:
      '200':
        description: List of messages
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: array
                  items:
                    $ref: '../openapi.yaml#/components/schemas/Message'
            example:
              payload:
                - id: 1
                  content: "Hello, I need help with my order"
                  message_type: 0
                  sender_type: "Contact"
                  created_at: "2025-01-01T10:00:00Z"
                - id: 2
                  content: "Hi! I'd be happy to help. What's your order number?"
                  message_type: 1
                  sender_type: "User"
                  created_at: "2025-01-01T10:01:00Z"

  post:
    tags:
      - Messages
    summary: Create message
    description: Send a new message in a conversation
    operationId: createMessage
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - content
            properties:
              content:
                type: string
                example: "Hello, how can I help you today?"
              message_type:
                type: string
                enum: [outgoing, incoming]
                default: "outgoing"
              private:
                type: boolean
                default: false
                description: Private notes visible only to agents
              content_type:
                type: string
                enum: [text, input_select, cards, form, article]
                default: "text"
              content_attributes:
                type: object
                additionalProperties: true
              template_params:
                type: object
                description: Template parameters for WhatsApp templates
              cc_emails:
                type: string
                description: CC email addresses for email conversations
              bcc_emails:
                type: string
                description: BCC email addresses for email conversations
          example:
            content: "Hello, how can I help you today?"
            message_type: "outgoing"
            private: false
        multipart/form-data:
          schema:
            type: object
            properties:
              content:
                type: string
              attachments[]:
                type: array
                items:
                  type: string
                  format: binary
    responses:
      '201':
        description: Message created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Message'
            example:
              id: 3
              content: "Hello, how can I help you today?"
              message_type: 1
              private: false
              sender_type: "User"
              sender_id: 1
              conversation_id: 1
              created_at: "2025-01-01T10:02:00Z"
      '422':
        description: Validation error

/accounts/{account_id}/conversations/{conversation_id}/messages/{message_id}:
  get:
    tags:
      - Messages
    summary: Get message
    description: Get a specific message by ID
    operationId: getMessage
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Message details
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Message'
      '404':
        description: Message not found

  patch:
    tags:
      - Messages
    summary: Update message
    description: Update a message (within edit window)
    operationId: updateMessage
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: string
                example: "Updated message content"
          example:
            content: "Updated message content"
    responses:
      '200':
        description: Message updated
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Message'
      '403':
        description: Edit window expired

  delete:
    tags:
      - Messages
    summary: Delete message
    description: Delete a message
    operationId: deleteMessage
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: conversation_id
        in: path
        required: true
        schema:
          type: integer
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Message deleted
      '403':
        description: Cannot delete message
