openapi: 3.0.0
info:
  title: Your API Title
  version: 1.0.0
paths:
  /accounts/{account_id}/contact_inboxes/filter:
    post:
      tags:
        - Contact Inboxes
      summary: Filter contact inboxes
      description: Filters contact inboxes for the specified account
      operationId: filterContactInboxes
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Filtered contact inboxes
          content:
            application/json:
              schema:
                type: object
                properties:
                  filtered:
                    type: array
                    items:
                      type: object
                  filters:
                    type: object
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
