# Profile API Paths

/profile:
  get:
    tags:
      - Profile
    summary: Get user profile
    description: Get the current user's profile information
    operationId: getProfile
    security:
      - bearerAuth: []
    responses:
      '200':
        description: User profile
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/User'
      '401':
        description: Unauthenticated

  patch:
    tags:
      - Profile
    summary: Update user profile
    description: Update the current user's profile information
    operationId: updateProfile
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: "John Doe"
              email:
                type: string
                format: email
                example: "john@example.com"
              avatar:
                type: string
                format: binary
                description: Avatar image file
          example:
            name: "John Doe"
            email: "john@example.com"
    responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/User'
      '422':
        description: Validation error

/profile/password:
  patch:
    tags:
      - Profile
    summary: Update password
    description: Update the current user's password
    operationId: updatePassword
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - current_password
              - password
              - password_confirmation
            properties:
              current_password:
                type: string
                format: password
                example: "oldpassword123"
              password:
                type: string
                format: password
                minLength: 8
                example: "newpassword123"
              password_confirmation:
                type: string
                format: password
                example: "newpassword123"
          example:
            current_password: "oldpassword123"
            password: "newpassword123"
            password_confirmation: "newpassword123"
    responses:
      '200':
        description: Password updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Password updated successfully"
      '422':
        description: Validation error

/profile/availability:
  patch:
    tags:
      - Profile
    summary: Update availability status
    description: Update the current user's availability status
    operationId: updateAvailability
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - availability
            properties:
              availability:
                type: string
                enum: [online, busy, offline]
                example: "online"
              account_id:
                type: integer
                example: 1
          example:
            availability: "online"
            account_id: 1
    responses:
      '200':
        description: Availability updated
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/User'

/profile/auto_offline:
  patch:
    tags:
      - Profile
    summary: Update auto-offline setting
    description: Configure automatic offline status when browser is closed
    operationId: updateAutoOffline
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - auto_offline
            properties:
              auto_offline:
                type: boolean
                example: true
          example:
            auto_offline: true
    responses:
      '200':
        description: Setting updated
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/User'

/profile/avatar:
  delete:
    tags:
      - Profile
    summary: Delete avatar
    description: Remove the current user's avatar image
    operationId: deleteAvatar
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Avatar deleted
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/User'

/profile/set_active_account:
  put:
    tags:
      - Profile
    summary: Set active account
    description: Set the user's currently active account
    operationId: setActiveAccount
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - account_id
            properties:
              account_id:
                type: integer
                example: 1
          example:
            account_id: 1
    responses:
      '200':
        description: Active account set
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Active account updated"

/profile/resend_confirmation:
  post:
    tags:
      - Profile
    summary: Resend confirmation email
    description: Resend the email confirmation link
    operationId: resendConfirmation
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Confirmation email sent
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Confirmation email sent"

/profile/reset_access_token:
  post:
    tags:
      - Profile
    summary: Reset access token
    description: Generate a new API access token
    operationId: resetAccessToken
    security:
      - bearerAuth: []
    responses:
      '200':
        description: New access token generated
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
                  example: "new_access_token_here"

# MFA Endpoints
/profile/mfa:
  get:
    tags:
      - MFA
    summary: Get MFA status
    description: Get the current MFA configuration status
    operationId: getMfaStatus
    security:
      - bearerAuth: []
    responses:
      '200':
        description: MFA status
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  example: false
                backup_codes_count:
                  type: integer
                  example: 8

  post:
    tags:
      - MFA
    summary: Enable MFA
    description: Generate MFA secret and QR code for setup
    operationId: enableMfa
    security:
      - bearerAuth: []
    responses:
      '200':
        description: MFA setup data
        content:
          application/json:
            schema:
              type: object
              properties:
                provisioning_uri:
                  type: string
                  example: "otpauth://totp/ClearLine:user@example.com?secret=..."
                secret:
                  type: string
                  example: "JBSWY3DPEHPK3PXP"
                qr_code:
                  type: string
                  description: Base64 encoded QR code image

  delete:
    tags:
      - MFA
    summary: Disable MFA
    description: Disable MFA for the current user
    operationId: disableMfa
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - otp
            properties:
              otp:
                type: string
                example: "123456"
          example:
            otp: "123456"
    responses:
      '200':
        description: MFA disabled
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "MFA disabled successfully"

/profile/mfa/verify:
  post:
    tags:
      - MFA
    summary: Verify MFA code
    description: Verify OTP code and activate MFA
    operationId: verifyMfa
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - otp
            properties:
              otp:
                type: string
                example: "123456"
          example:
            otp: "123456"
    responses:
      '200':
        description: MFA verified and activated
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "MFA enabled successfully"
                backup_codes:
                  type: array
                  items:
                    type: string
                  example: ["abc123", "def456", "ghi789"]
      '422':
        description: Invalid OTP code

/profile/mfa/backup_codes:
  post:
    tags:
      - MFA
    summary: Generate backup codes
    description: Generate new backup codes (invalidates existing ones)
    operationId: generateBackupCodes
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - otp
            properties:
              otp:
                type: string
                example: "123456"
          example:
            otp: "123456"
    responses:
      '200':
        description: New backup codes generated
        content:
          application/json:
            schema:
              type: object
              properties:
                backup_codes:
                  type: array
                  items:
                    type: string
                  example: ["abc123", "def456", "ghi789", "jkl012", "mno345", "pqr678", "stu901", "vwx234"]
