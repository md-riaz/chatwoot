/accounts/{account_id}/integrations/shopify/contacts/{contact_id}/orders:
  get:
    tags:
      - Integrations
    summary: Get customer orders
    description: Get Shopify orders for a contact
    operationId: getShopifyOrders
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
      - name: contact_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Customer orders
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  order_number:
                    type: string
                  total_price:
                    type: string
                  financial_status:
                    type: string
                  fulfillment_status:
                    type: string
                  created_at:
                    type: string
                    format: date-time
            example:
              - id: "123456789"
                order_number: "#1001"
                total_price: "99.99"
                financial_status: "paid"
                fulfillment_status: "fulfilled"
                created_at: "2025-01-01T10:00:00Z"

