/accounts/{account_id}/integrations/linear/issues:
  post:
    tags:
      - Integrations
    summary: Create Linear issue
    description: Create a Linear issue from a conversation
    operationId: createLinearIssue
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - conversation_id
              - title
            properties:
              conversation_id:
                type: integer
                example: 1
              title:
                type: string
                example: "Bug: Login not working"
              description:
                type: string
                example: "Customer reports login page showing error"
              team_id:
                type: string
              priority:
                type: integer
                enum: [0, 1, 2, 3, 4]
          example:
            conversation_id: 1
            title: "Bug: Login not working"
            description: "Customer reports login page showing error"
    responses:
      '201':
        description: Linear issue created
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_id:
                  type: string
                issue_url:
                  type: string
            example:
              issue_id: "ABC-123"
              issue_url: "https://linear.app/team/issue/ABC-123"

