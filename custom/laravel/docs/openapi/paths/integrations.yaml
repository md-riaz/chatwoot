# Integrations API Paths

/accounts/{account_id}/integrations:
  get:
    tags:
      - Integrations
    summary: List integrations
    description: Get all available integrations and their status
    operationId: listIntegrations
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of integrations
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "slack"
                      name:
                        type: string
                        example: "Slack"
                      description:
                        type: string
                      enabled:
                        type: boolean
                      hooks:
                        type: array
                        items:
                          type: object
            example:
              data:
                - id: "slack"
                  name: "Slack"
                  description: "Connect Slack for notifications"
                  enabled: true
                - id: "dialogflow"
                  name: "Dialogflow"
                  description: "AI-powered chatbot"
                  enabled: false

# Slack Integration
/accounts/{account_id}/integrations/slack:
  get:
    tags:
      - Integrations
    summary: Get Slack integration
    description: Get Slack integration configuration
    operationId: getSlackIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Slack integration details
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                slack_channel_id:
                  type: string
                team_name:
                  type: string

  post:
    tags:
      - Integrations
    summary: Create Slack integration
    description: Connect Slack to the account (Admin only)
    operationId: createSlackIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - code
            properties:
              code:
                type: string
                description: OAuth authorization code
                example: "xoxb-..."
          example:
            code: "xoxb-123456789"
    responses:
      '201':
        description: Slack integration created
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Slack integration created"

  delete:
    tags:
      - Integrations
    summary: Delete Slack integration
    description: Disconnect Slack from the account (Admin only)
    operationId: deleteSlackIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Slack integration deleted

/accounts/{account_id}/integrations/slack/channels:
  get:
    tags:
      - Integrations
    summary: List Slack channels
    description: Get available Slack channels for the connected workspace
    operationId: listSlackChannels
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: List of Slack channels
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: "C12345678"
                  name:
                    type: string
                    example: "support"

# Dialogflow Integration
/accounts/{account_id}/integrations/dialogflow:
  get:
    tags:
      - Integrations
    summary: Get Dialogflow integration
    description: Get Dialogflow integration configuration
    operationId: getDialogflowIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Dialogflow integration details
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                project_id:
                  type: string
                inbox_ids:
                  type: array
                  items:
                    type: integer

  post:
    tags:
      - Integrations
    summary: Create Dialogflow integration
    description: Configure Dialogflow integration (Admin only)
    operationId: createDialogflowIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - project_id
              - credentials
            properties:
              project_id:
                type: string
                example: "my-gcp-project"
              credentials:
                type: object
                description: Google Cloud service account JSON
              inbox_ids:
                type: array
                items:
                  type: integer
                example: [1, 2]
          example:
            project_id: "my-gcp-project"
            credentials:
              type: "service_account"
              project_id: "my-gcp-project"
            inbox_ids: [1]
    responses:
      '201':
        description: Dialogflow integration created

  delete:
    tags:
      - Integrations
    summary: Delete Dialogflow integration
    description: Remove Dialogflow integration (Admin only)
    operationId: deleteDialogflowIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Dialogflow integration deleted

# OpenAI Integration
/accounts/{account_id}/integrations/openai:
  get:
    tags:
      - Integrations
    summary: Get OpenAI integration
    description: Get OpenAI integration configuration
    operationId: getOpenAIIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: OpenAI integration details
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                features:
                  type: array
                  items:
                    type: string
                  example: ["reply_suggestion", "summarization"]

  post:
    tags:
      - Integrations
    summary: Create OpenAI integration
    description: Configure OpenAI integration (Admin only)
    operationId: createOpenAIIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - api_key
            properties:
              api_key:
                type: string
                example: "sk-..."
              model:
                type: string
                default: "gpt-4"
                example: "gpt-4"
          example:
            api_key: "sk-abc123..."
            model: "gpt-4"
    responses:
      '201':
        description: OpenAI integration created

  delete:
    tags:
      - Integrations
    summary: Delete OpenAI integration
    description: Remove OpenAI integration (Admin only)
    operationId: deleteOpenAIIntegration
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: OpenAI integration deleted

/accounts/{account_id}/integrations/openai/suggest:
  post:
    tags:
      - Integrations
    summary: Get reply suggestions
    description: Get AI-powered reply suggestions for a conversation
    operationId: getOpenAISuggestions
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - conversation_id
            properties:
              conversation_id:
                type: integer
                example: 1
              tone:
                type: string
                enum: [formal, friendly, professional]
                example: "friendly"
          example:
            conversation_id: 1
            tone: "friendly"
    responses:
      '200':
        description: Reply suggestions
        content:
          application/json:
            schema:
              type: object
              properties:
                suggestions:
                  type: array
                  items:
                    type: string
            example:
              suggestions:
                - "Thank you for reaching out! I'd be happy to help..."
                - "I understand your concern. Let me look into this..."

/accounts/{account_id}/integrations/openai/summarize:
  post:
    tags:
      - Integrations
    summary: Summarize conversation
    description: Get AI-powered conversation summary
    operationId: summarizeConversation
    security:
      - bearerAuth: []
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - conversation_id
            properties:
              conversation_id:
                type: integer
                example: 1
          example:
            conversation_id: 1
    responses:
      '200':
        description: Conversation summary
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
            example:
              summary: "Customer inquired about order #12345 shipping status. Agent confirmed the order shipped yesterday and provided tracking number."

