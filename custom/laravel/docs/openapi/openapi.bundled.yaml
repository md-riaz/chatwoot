  # Contacts API Paths

  /accounts/{account_id}/contacts:
    get:
      tags:
        - Contacts
      summary: List contacts
      description: Get all contacts for an account
      operationId: listContacts
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, email, phone_number, last_activity_at, created_at]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  meta:
                    $ref: '#/components/schemas/Pagination'
              example:
                data:
                  - id: 1
                    name: "Jane Customer"
                    email: "jane@customer.com"
                    phone_number: "+1234567890"
                  - id: 2
                    name: "John Client"
                    email: "john@client.com"
                meta:
                  current_page: 1
                  per_page: 25
                  total: 150

    post:
      tags:
        - Contacts
      summary: Create contact
      description: Create a new contact
      operationId: createContact
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inbox_id:
                  type: integer
                  example: 1
                name:
                  type: string
                  example: "Jane Doe"
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                phone_number:
                  type: string
                  example: "+1234567890"
                identifier:
                  type: string
                  example: "customer_123"
                custom_attributes:
                  type: object
                  additionalProperties: true
                  example:
                    company: "Acme Corp"
                    plan: "premium"
            example:
              inbox_id: 1
              name: "Jane Doe"
              email: "jane@example.com"
              phone_number: "+1234567890"
              custom_attributes:
                company: "Acme Corp"
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '422':
          description: Validation error

