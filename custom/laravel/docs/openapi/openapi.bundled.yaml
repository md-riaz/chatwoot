paths:
  /super_admin/accounts:
    get:
      tags:
      - Super Admin
      summary: List all accounts
      description: Get a paginated list of all accounts in the system (super admin
        only)
      operationId: listSuperAdminAccounts
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: per_page
        in: query
        schema:
          type: integer
          default: 15
      responses:
        '200':
          description: List of accounts
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden - Super admin access required
    post:
      tags:
      - Super Admin
      summary: Create account
      description: Create a new account (super admin only)
      operationId: createSuperAdminAccount
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                locale:
                  type: string
                  default: en
      responses:
        '201':
          description: Account created
        '422':
          description: Validation error
  /super_admin/accounts/{account}:
    get:
      tags:
      - Super Admin
      summary: Get account details
      operationId: getSuperAdminAccount
      security:
      - bearerAuth: []
      parameters:
      - name: account
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Account details
    patch:
      tags:
      - Super Admin
      summary: Update account
      operationId: updateSuperAdminAccount
      security:
      - bearerAuth: []
      parameters:
      - name: account
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                locale:
                  type: string
                features:
                  type: object
                limits:
                  type: object
      responses:
        '200':
          description: Account updated
    delete:
      tags:
      - Super Admin
      summary: Delete account
      operationId: deleteSuperAdminAccount
      security:
      - bearerAuth: []
      parameters:
      - name: account
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Account deleted
  /super_admin/accounts/{account}/seed:
    post:
      tags:
      - Super Admin
      summary: Seed account with demo data
      operationId: seedSuperAdminAccount
      security:
      - bearerAuth: []
      parameters:
      - name: account
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Account seeded with demo data
  /super_admin/accounts/{account}/reset_cache:
    post:
      tags:
      - Super Admin
      summary: Reset account cache
