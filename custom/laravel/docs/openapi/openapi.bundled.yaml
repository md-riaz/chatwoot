        content:
          application/json:
            schema:
              type: object
              required:
                - conversation_id
                - title
              properties:
                conversation_id:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: "Bug: Login not working"
                description:
                  type: string
                  example: "Customer reports login page showing error"
                team_id:
                  type: string
                priority:
                  type: integer
                  enum: [0, 1, 2, 3, 4]
            example:
              conversation_id: 1
              title: "Bug: Login not working"
              description: "Customer reports login page showing error"
      responses:
        '201':
          description: Linear issue created
          content:
            application/json:
              schema:
                type: object
                properties:
                  issue_id:
                    type: string
                  issue_url:
                    type: string
              example:
                issue_id: "ABC-123"
                issue_url: "https://linear.app/team/issue/ABC-123"

  # Shopify Integration
  /accounts/{account_id}/integrations/shopify:
    get:
      tags:
        - Integrations
      summary: Get Shopify integration
      description: Get Shopify integration configuration
      operationId: getShopifyIntegration
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Shopify integration details
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  shop_domain:
                    type: string
                    example: "mystore.myshopify.com"

    post:
      tags:
        - Integrations
      summary: Create Shopify integration
      description: Configure Shopify integration (Admin only)
      operationId: createShopifyIntegration
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shop_domain
                - access_token
              properties:
                shop_domain:
                  type: string
                  example: "mystore.myshopify.com"
                access_token:
                  type: string
                  example: "shpat_..."
            example:
              shop_domain: "mystore.myshopify.com"
              access_token: "shpat_abc123..."
      responses:
        '201':
          description: Shopify integration created

    delete:
      tags:
        - Integrations
      summary: Delete Shopify integration
      description: Remove Shopify integration (Admin only)
      operationId: deleteShopifyIntegration
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Shopify integration deleted

  /accounts/{account_id}/integrations/shopify/contacts/{contact_id}/orders:
    get:
      tags:
        - Integrations
      summary: Get customer orders
      description: Get Shopify orders for a contact
      operationId: getShopifyOrders
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
        - name: contact_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Customer orders
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    order_number:
                      type: string
                    total_price:
                      type: string
                    financial_status:
                      type: string
                    fulfillment_status:
                      type: string
                    created_at:
                      type: string
                      format: date-time
              example:
                - id: "123456789"
                  order_number: "#1001"
                  total_price: "99.99"
                  financial_status: "paid"
                  fulfillment_status: "fulfilled"
                  created_at: "2025-01-01T10:00:00Z"

