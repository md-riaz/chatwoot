        - bearerAuth: []
      responses:
        '200':
          description: MFA status
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    example: false
                  backup_codes_count:
                    type: integer
                    example: 8

    post:
      tags:
        - MFA
      summary: Enable MFA
      description: Generate MFA secret and QR code for setup
      operationId: enableMfa
      security:
        - bearerAuth: []
      responses:
        '200':
          description: MFA setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  provisioning_uri:
                    type: string
                    example: "otpauth://totp/ClearLine:user@example.com?secret=..."
                  secret:
                    type: string
                    example: "JBSWY3DPEHPK3PXP"
                  qr_code:
                    type: string
                    description: Base64 encoded QR code image

    delete:
      tags:
        - MFA
      summary: Disable MFA
      description: Disable MFA for the current user
      operationId: disableMfa
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otp
              properties:
                otp:
                  type: string
                  example: "123456"
            example:
              otp: "123456"
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "MFA disabled successfully"

  /profile/mfa/verify:
    post:
      tags:
        - MFA
      summary: Verify MFA code
      description: Verify OTP code and activate MFA
      operationId: verifyMfa
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otp
              properties:
                otp:
                  type: string
                  example: "123456"
            example:
              otp: "123456"
      responses:
        '200':
          description: MFA verified and activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "MFA enabled successfully"
                  backup_codes:
                    type: array
                    items:
                      type: string
                    example: ["abc123", "def456", "ghi789"]
        '422':
          description: Invalid OTP code

  /profile/mfa/backup_codes:
    post:
