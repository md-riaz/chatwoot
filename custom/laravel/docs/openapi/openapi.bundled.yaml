  # Automation Rules
  /accounts/{account_id}/automation_rules:
    get:
      tags:
        - Automation Rules
      summary: List automation rules
      description: Get all automation rules for an account
      operationId: listAutomationRules
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of automation rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AutomationRule'

    post:
      tags:
        - Automation Rules
      summary: Create automation rule
      description: Create a new automation rule (Admin only)
      operationId: createAutomationRule
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - event_name
                - conditions
                - actions
              properties:
                name:
                  type: string
                  example: "Auto-assign VIP customers"
                description:
                  type: string
                event_name:
                  type: string
                  enum: [conversation_created, conversation_updated, message_created]
                  example: "conversation_created"
                active:
                  type: boolean
                  default: true
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      attribute_key:
                        type: string
                      filter_operator:
                        type: string
                      values:
                        type: array
                        items:
                          type: string
                actions:
                  type: array
                  items:
                    type: object
                    properties:
                      action_name:
                        type: string
                      action_params:
                        type: array
                        items: {}
            example:
              name: "Auto-assign VIP customers"
              event_name: "conversation_created"
              conditions:
                - attribute_key: "contact_custom_attribute.customer_type"
                  filter_operator: "equal_to"
                  values: ["VIP"]
              actions:
                - action_name: "assign_team"
                  action_params: [1]
      responses:
        '201':
          description: Automation rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRule'

