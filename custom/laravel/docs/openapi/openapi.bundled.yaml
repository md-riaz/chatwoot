          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  example: "Hello, how can I help you today?"
                message_type:
                  type: string
                  enum: [outgoing, incoming]
                  default: "outgoing"
                private:
                  type: boolean
                  default: false
                  description: Private notes visible only to agents
                content_type:
                  type: string
                  enum: [text, input_select, cards, form, article]
                  default: "text"
                content_attributes:
                  type: object
                  additionalProperties: true
                template_params:
                  type: object
                  description: Template parameters for WhatsApp templates
                cc_emails:
                  type: string
                  description: CC email addresses for email conversations
                bcc_emails:
                  type: string
                  description: BCC email addresses for email conversations
            example:
              content: "Hello, how can I help you today?"
              message_type: "outgoing"
              private: false
          multipart/form-data:
            schema:
              type: object
              properties:
                content:
                  type: string
                attachments[]:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                id: 3
                content: "Hello, how can I help you today?"
                message_type: 1
                private: false
                sender_type: "User"
                sender_id: 1
                conversation_id: 1
                created_at: "2025-01-01T10:02:00Z"
