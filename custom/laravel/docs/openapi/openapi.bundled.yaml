  /installation/onboarding:
    post:
      tags:
        - Authentication
      summary: First-time onboarding (create super admin)
      description: >-
        Creates the first account and a user with the super_admin role. This endpoint is available only once, immediately after install/seed. Further requests are blocked after onboarding is complete.
      operationId: onboardingCreateSuperAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  type: object
                  required:
                    - name
                    - company
                    - email
                    - password
                  properties:
                    name:
                      type: string
                    company:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                subscribe_to_updates:
                  type: boolean
      responses:
        '201':
          description: Super admin and account created
        '403':
          description: Onboarding already completed
        '422':
          description: Validation error
openapi: 3.0.3
info:
  title: ClearLine API
  description: 'Complete API documentation for ClearLine - a customer engagement platform.


    ## Authentication


    The API uses different authentication methods based on the endpoint type:


    - **Bearer Token**: Most authenticated endpoints use Sanctum Bearer tokens

    - **Platform API Key**: Platform-level endpoints use API key authentication

    - **Widget Token**: Widget endpoints use X-Auth-Token header

    - **Public**: Some endpoints are publicly accessible


    ## Base URL


    All API endpoints are prefixed with `/api/v1/`

    '
  version: 1.0.0
  contact:
    name: ClearLine Support
    email: support@clearline.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: '{protocol}://{host}/api/v1'
  description: API Server
  variables:
    protocol:
      default: https
      enum:
      - http
      - https
    host:
      default: localhost:8000
      description: API host
tags:
