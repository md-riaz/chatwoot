components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Sanctum Bearer Token
    apiKeyAuth:
      type: apiKey
      in: header
      name: api_access_token
      description: Platform API Key
    widgetAuth:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: Widget authentication token
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Error message
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 25
        total:
          type: integer
          example: 100
        last_page:
          type: integer
          example: 4
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        avatar_url:
          type: string
          nullable: true
          example: https://example.com/avatar.jpg
        type:
          type: string
          example: user
        availability_status:
          type: string
          enum:
          - online
          - busy
          - offline
          example: online
        auto_offline:
          type: boolean
          example: true
        confirmed:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Account:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Acme Corp
        locale:
          type: string
          example: en
        domain:
          type: string
          nullable: true
          example: acme.com
        support_email:
          type: string
          format: email
          nullable: true
          example: support@acme.com
        auto_resolve_duration:
          type: integer
          nullable: true
          example: 7
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Conversation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        account_id:
          type: integer
          example: 1
        inbox_id:
          type: integer
          example: 1
        contact_id:
          type: integer
          example: 1
        assignee_id:
          type: integer
          nullable: true
          example: 2
        team_id:
          type: integer
          nullable: true
          example: 1
        status:
          type: string
          enum:
          - open
          - resolved
          - pending
          - snoozed
          example: open
        priority:
          type: string
          enum:
          - low
          - medium
          - high
          - urgent
          nullable: true
          example: medium
        display_id:
          type: integer
          example: 101
        unread_count:
          type: integer
          example: 3
        first_reply_created_at:
          type: string
          format: date-time
          nullable: true
        last_activity_at:
          type: string
          format: date-time
        custom_attributes:
          type: object
          additionalProperties: true
        labels:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        meta:
          type: object
          properties:
            sender:
              $ref: '#/components/schemas/Contact'
            assignee:
              $ref: '#/components/schemas/User'
    Message:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: Hello, how can I help you?
        content_type:
          type: string
          enum:
          - text
          - input_select
          - cards
          - form
          - article
          - incoming_email
          - input_csat
          - integrations
          example: text
        content_attributes:
          type: object
          additionalProperties: true
        message_type:
          type: integer
          description: '0: incoming, 1: outgoing, 2: activity'
          example: 1
        private:
          type: boolean
          example: false
        sender_type:
          type: string
          enum:
          - User
          - Contact
          - AgentBot
          example: User
        sender_id:
          type: integer
          example: 1
        conversation_id:
          type: integer
          example: 1
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        file_type:
          type: string
          enum:
          - image
          - audio
          - video
          - file
          - location
          - contact
          - fallback
          example: image
        data_url:
          type: string
          example: https://example.com/file.jpg
        thumb_url:
          type: string
          nullable: true
          example: https://example.com/file_thumb.jpg
        file_size:
          type: integer
          example: 102400
        extension:
          type: string
          nullable: true
          example: jpg
    Contact:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Jane Customer
        email:
          type: string
          format: email
          nullable: true
          example: jane@customer.com
        phone_number:
