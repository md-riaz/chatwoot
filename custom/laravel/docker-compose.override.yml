# Docker Compose Override for Development
# This file is automatically loaded by docker-compose and overrides settings for development

version: '3.8'

services:
  app:
    build:
      target: development
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    ports:
      - "8000:80"
      - "8080:8080"

  queue:
    build:
      target: development
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules

  websocket:
    build:
      target: development
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules

  scheduler:
    build:
      target: development
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules

  # Enable development services
  mailhog:
    profiles: []

  pgadmin:
    profiles: []

  redis-commander:
    profiles: []